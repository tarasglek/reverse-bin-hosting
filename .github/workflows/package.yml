name: package

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper unzip curl python3-dotenv
          go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Cache packaged runtimes
        uses: actions/cache@v4
        with:
          path: ~/.cache/reverse-bin-hosting/runtimes
          key: runtimes-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packaging/runtime-versions.env') }}
          restore-keys: |
            runtimes-${{ runner.os }}-${{ runner.arch }}-

      - name: Check bundled runtime versions are current
        run: |
          make update-runtime-versions
          git diff --exit-code packaging/runtime-versions.env

      - name: Build Caddy binary
        run: make build

      - name: Run tests
        run: make tests

      - name: Build Debian package
        run: make deb

      - name: Collect package artifacts
        run: |
          mkdir -p dist
          version=$(dpkg-parsechangelog -S Version)
          cp "../reverse-bin_${version}_amd64.deb" dist/
          ls -lh dist/

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reverse-bin-debian-packages
          path: dist/*
          if-no-files-found: error

      - name: Validate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/check-release-notes.sh "release-notes/$GITHUB_REF_NAME.md"

      - name: Attach package artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release-notes/${{ github.ref_name }}.md
